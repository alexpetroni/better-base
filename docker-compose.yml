# Local development services. Phase 2 adds MinIO + imgproxy as further services.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: better
      POSTGRES_PASSWORD: better
      POSTGRES_DB: better_sleep
    ports:
      # Host port is configurable because 5432 is often taken on dev machines.
      - '${DB_PORT:-5433}:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U better -d better_sleep']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
