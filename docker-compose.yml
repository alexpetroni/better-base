# Local development services: Postgres, MinIO (S3-compatible storage) and
# imgproxy (on-the-fly image transforms, signed URLs, reads from MinIO).
# Postgres/MinIO dev credentials have local-only defaults overridable from the
# environment / root .env. The imgproxy signing key/salt deliberately have NO
# defaults — set IMGPROXY_KEY/IMGPROXY_SALT in .env (see .env.example).
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: better
      POSTGRES_PASSWORD: better
      POSTGRES_DB: better_sleep
    ports:
      # Host port is configurable because 5432 is often taken on dev machines.
      - '${DB_PORT:-5433}:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U better -d better_sleep']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-better-media}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-better-media-secret}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 10

  imgproxy:
    image: ghcr.io/imgproxy/imgproxy:v3
    restart: unless-stopped
    environment:
      # Signature is mandatory: without valid key/salt-signed URLs imgproxy
      # 403s. NO fallback values on purpose (audit H3): a committed default
      # pair would make signing forgeable on any deploy that inherits it, and
      # an EMPTY pair would disable signing entirely. Compose refuses to start
      # until .env provides both — generate with `openssl rand -hex 32`.
      IMGPROXY_KEY: ${IMGPROXY_KEY:?generate with `openssl rand -hex 32` and put in .env}
      IMGPROXY_SALT: ${IMGPROXY_SALT:?generate with `openssl rand -hex 32` and put in .env}
      # SVG sources pass through unrasterized, so strip scripts/event handlers
      # before serving (audit M1 — stored XSS via a crafted SVG upload). The
      # app additionally serves SVGs with Content-Disposition: attachment.
      IMGPROXY_SANITIZE_SVG: 'true'
      # Source caps (audit L7): refuse sources bigger than the app's upload
      # limit (15 MiB, MAX_UPLOAD_BYTES) or denser than 50 megapixels, so a
      # decompression-bomb object can't pin the transformer.
      IMGPROXY_MAX_SRC_FILE_SIZE: '15728640'
      IMGPROXY_MAX_SRC_RESOLUTION: '50'
      # Source images come from the s3:// bucket; inside the compose network
      # MinIO is reached by service name, not the host-published port.
      IMGPROXY_USE_S3: 'true'
      IMGPROXY_S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-better-media}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-better-media-secret}
      AWS_REGION: ${S3_REGION:-us-east-1}
    ports:
      - '${IMGPROXY_PORT:-8888}:8080'
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'imgproxy', 'health']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
  minio-data:
